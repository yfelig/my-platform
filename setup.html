<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup · My Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 480px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 40px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #e8e8f0;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input:focus { border-color: #7c3aed; }

    .hint {
      font-size: 12px;
      color: #4b5563;
      margin-top: -14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .hint a { color: #7c3aed; text-decoration: none; }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      margin-bottom: 12px;
    }

    .btn-secondary {
      background: #2a2a38;
      color: #9ca3af;
    }

    .btn:hover { opacity: 0.9; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #4b5563;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a2a38;
    }

    .error {
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">my platform</div>
    <div class="subtitle">One-time setup · takes 2 minutes</div>
    <h2>Connect your GitHub</h2>

    <div class="error" id="error"></div>

    <label>GitHub Personal Access Token</label>
    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" />
    <p class="hint">
      Create one at <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens</a> — only needs <strong>gist</strong> scope.
    </p>

    <button class="btn btn-primary" onclick="createNew()">Create new Gist &amp; get started</button>

    <div class="divider">or connect existing</div>

    <label>Gist ID (optional)</label>
    <input type="text" id="gistId" placeholder="existing gist id" />

    <button class="btn btn-secondary" onclick="connectExisting()">Connect existing Gist</button>
  </div>

  <script src="gist.js"></script>
  <script>
    // Pre-fill if already configured
    const cfg = Gist.getConfig();
    if (cfg.token) document.getElementById('token').value = cfg.token;
    if (cfg.gistId) document.getElementById('gistId').value = cfg.gistId;

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function createNew() {
      const token = document.getElementById('token').value.trim();
      if (!token) return showError('Please enter your GitHub token.');
      try {
        const gistId = await Gist.createGist(token);
        localStorage.setItem('gist_token', token);
        localStorage.setItem('gist_id', gistId);
        window.location.href = 'index.html';
      } catch (e) {
        showError('Could not create Gist. Check your token has "gist" scope.');
      }
    }

    async function connectExisting() {
      const token = document.getElementById('token').value.trim();
      const gistId = document.getElementById('gistId').value.trim();
      if (!token || !gistId) return showError('Please enter both token and Gist ID.');
      localStorage.setItem('gist_token', token);
      localStorage.setItem('gist_id', gistId);
      try {
        await Gist.load();
        window.location.href = 'index.html';
      } catch (e) {
        showError('Could not read Gist. Check your token and Gist ID.');
      }
    }
  </script>
</body>
</html>
