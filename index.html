<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo" onclick="navigate('dashboard')">my platform</div>
    <nav>
      <a data-view="dashboard" onclick="navigate('dashboard')">Dashboard</a>
      <a data-view="projects" onclick="navigate('projects')">Projects</a>
      <a data-view="tasks" onclick="navigate('tasks')">Tasks</a>
      <a data-view="pomodoro" onclick="navigate('pomodoro')">Pomodoro</a>
    </nav>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="bot-toggle-btn" onclick="toggleBot()" title="AI Assistant">✦</button>
      <button class="btn btn-ghost btn-sm" onclick="window.location.href='setup.html'" title="Settings">⚙</button>
    </div>
  </header>

  <!-- Bot panel -->
  <div id="bot-panel" class="bot-panel">
    <div class="bot-header">
      <div class="bot-title">✦ AI Assistant</div>
      <button class="btn btn-ghost btn-sm" onclick="toggleBot()" style="padding:4px 10px;line-height:1">✕</button>
    </div>
    <div class="bot-messages" id="bot-messages"></div>
    <div class="bot-input-row">
      <textarea id="bot-input" class="bot-input" placeholder="Tell me what you need…" rows="1"
        oninput="botInputAutoResize(this)"
        onkeydown="botInputKeydown(event)"></textarea>
      <button class="btn btn-primary" id="bot-send-btn" onclick="botSend()" style="padding:8px 14px;flex-shrink:0;font-size:18px;line-height:1">↑</button>
    </div>
  </div>

  <main>
    <div id="view-dashboard" class="view"></div>
    <div id="view-projects" class="view"></div>
    <div id="view-project-detail" class="view"></div>
    <div id="view-tasks" class="view"></div>
    <div id="view-pomodoro" class="view"></div>
  </main>

  <button class="fab" id="fab" onclick="fabClick()" title="Add (⌘K)" style="display:none">+</button>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-body"></div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="gist.js"></script>
  <script src="app.js"></script>
</body>
</html>
